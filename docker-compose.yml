services:
  # MongoDB Service
  mongo:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - mern-network

  # Express Backend Service
  server:
    build:
      context: ./server
    container_name: blogify-server
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/blogify
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - CLIENT_URL=${CLIENT_URL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - mern-network

  # React Frontend Service
  client:
    build:
      context: ./client
    container_name: blogify-client
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - mern-network

volumes:
  mongodb_data:

networks:
  mern-network:
    driver: bridge
